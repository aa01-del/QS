<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap');
:root{
  --bg:#0e0e0e;--bg2:#161616;--panel:#1e1e1e;--panel2:#242424;
  --ink:#f0f0f0;--ink-soft:#888;--line:#333;
  --acc:#fff;--acc2:#ccc;
  --green:#4caf6a;--green-bg:rgba(76,175,106,.13);
  --red:#e05252;--red-bg:rgba(224,82,82,.14);
  --gold:#c8922a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Newsreader',Georgia,serif;background:var(--bg);color:var(--ink);line-height:1.55;min-height:100vh;padding:28px 16px 80px;}
.wrap{max-width:740px;margin:0 auto;}
header{text-align:center;margin-bottom:28px;border-bottom:1px solid var(--line);padding-bottom:22px;}
h1{font-family:'Fraunces';font-weight:900;font-size:3rem;letter-spacing:-.02em;color:#fff;}
.sub{color:var(--ink-soft);font-size:.98rem;font-style:italic;margin-top:6px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:28px 24px;box-shadow:0 12px 32px -16px rgba(0,0,0,.8);}
button{font-family:'Fraunces';font-weight:700;cursor:pointer;border:none;transition:all .15s;}

/* Start screen */
.start{text-align:center;padding:36px 20px;}
.start p{color:var(--ink-soft);font-size:1.05rem;max-width:460px;margin:0 auto 24px;}
.mode-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--line);border-radius:4px;overflow:hidden;}
.mode-tab{flex:1;padding:12px 8px;background:var(--panel2);color:var(--ink-soft);font-family:'Fraunces';font-weight:700;font-size:.95rem;border:none;cursor:pointer;border-right:1px solid var(--line);}
.mode-tab:last-child{border-right:none;}
.mode-tab.active{background:#fff;color:#000;}
.mode-desc{font-style:italic;color:var(--ink-soft);font-size:.92rem;margin-bottom:20px;min-height:2.5em;}
.picker-label{font-family:'Fraunces';font-weight:700;color:var(--ink-soft);font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;}
.picker{display:flex;gap:10px;justify-content:center;margin-bottom:8px;}
.pick{flex:1;max-width:110px;background:var(--panel2);border:1.5px solid var(--line);border-radius:5px;padding:16px 8px;color:var(--ink);cursor:pointer;}
.pick .pn{font-family:'Fraunces';font-weight:900;font-size:2rem;line-height:1;color:#aaa;}
.pick .pl{font-style:italic;color:var(--ink-soft);font-size:.82rem;margin-top:3px;}
.pick.active{border-color:#fff;background:#1a1a1a;}
.pick.active .pn{color:#fff;}
.best-line{margin:8px 0 22px;font-style:italic;color:var(--ink-soft);font-size:.93rem;min-height:1.4em;}
.best-line b{font-family:'Fraunces';font-style:normal;color:var(--gold);}
.btn-primary{background:#fff;color:#000;font-size:1.12rem;padding:14px 40px;border-radius:4px;letter-spacing:.02em;}
.btn-primary:hover{background:#e0e0e0;}

/* Progress */
.progress-bar{height:5px;background:#2a2a2a;border-radius:99px;overflow:hidden;margin-bottom:7px;}
.progress-fill{height:100%;background:#fff;width:0;transition:width .35s ease;}
.progress-text{display:flex;justify-content:space-between;font-size:.88rem;color:var(--ink-soft);font-style:italic;margin-bottom:20px;}
.live-score b{font-family:'Fraunces';color:var(--green);font-style:normal;}

/* Learning mode indicator */
.mode-badge{display:inline-block;font-family:'Fraunces';font-weight:700;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--line);border-radius:99px;color:var(--ink-soft);margin-bottom:16px;}

/* Question */
.q-cat{font-family:'Fraunces';font-weight:700;color:var(--ink-soft);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.q-text{font-size:1.26rem;font-weight:500;line-height:1.42;margin-bottom:22px;color:#fff;}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{text-align:left;background:var(--panel2);border:1.5px solid var(--line);border-radius:4px;padding:13px 16px;
  font-family:'Newsreader';font-size:1.04rem;color:var(--ink);width:100%;display:flex;align-items:center;gap:12px;}
.opt:not(:disabled):hover{border-color:#888;background:#2a2a2a;}
.opt .marker{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);
  display:grid;place-items:center;font-family:'Fraunces';font-weight:700;font-size:.85rem;color:var(--ink-soft);}
.opt:disabled{cursor:default;}
.opt.correct{border-color:var(--green);background:var(--green-bg);}
.opt.correct .marker{background:var(--green);color:#fff;border-color:var(--green);}
.opt.wrong{border-color:var(--red);background:var(--red-bg);}
.opt.wrong .marker{background:var(--red);color:#fff;border-color:var(--red);}
.opt.dim{opacity:.38;}

/* Feedback */
.feedback{margin-top:16px;padding:12px 16px;border-radius:4px;font-size:1rem;}
.feedback.good{background:var(--green-bg);border-left:3px solid var(--green);animation:fade .25s ease;}
.feedback.bad{background:var(--red-bg);border-left:3px solid var(--red);animation:fade .25s ease;}
.feedback .ftitle{font-family:'Fraunces';font-weight:900;font-size:.9rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px;}
.feedback.good .ftitle{color:var(--green);}
.feedback.bad .ftitle{color:var(--red);}
.feedback .fcorrect{color:#fff;}
@keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

/* Learning mode: repeat counter */
.repeat-notice{margin-top:14px;padding:10px 14px;border-radius:4px;background:#1a1a1a;border:1px solid var(--line);font-style:italic;color:var(--ink-soft);font-size:.9rem;animation:fade .25s ease;}
.repeat-notice b{font-family:'Fraunces';color:var(--gold);font-style:normal;}

.nav-row{display:flex;justify-content:flex-end;align-items:center;margin-top:22px;}
.btn-ghost{background:transparent;color:#fff;border:1.5px solid #555;padding:11px 26px;border-radius:4px;font-size:1rem;}
.btn-ghost:hover{border-color:#fff;}
.waiting{font-style:italic;color:var(--ink-soft);font-size:.9rem;}

/* Results */
.result-head{text-align:center;margin-bottom:26px;}
.score-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;}
.score-pct{font-family:'Fraunces';font-weight:900;font-size:2.5rem;}
.verdict{font-family:'Fraunces';font-weight:900;font-size:1.9rem;margin-bottom:5px;color:#fff;}
.verdict-sub{font-style:italic;color:var(--ink-soft);}
.best-badge{margin-top:10px;display:inline-block;font-family:'Fraunces';font-weight:700;font-size:.88rem;padding:5px 14px;border-radius:99px;border:1px solid var(--gold);color:var(--gold);}
.summary-pills{display:flex;justify-content:center;gap:30px;margin:18px 0 4px;}
.pill .n{font-family:'Fraunces';font-weight:900;font-size:2rem;}
.pill .l{font-style:italic;color:var(--ink-soft);font-size:.92rem;}
.pill.ok .n{color:var(--green);}
.pill.no .n{color:var(--red);}
.review-item{border-top:1px solid var(--line);padding:14px 0;}
.review-item:last-child{border-bottom:1px solid var(--line);}
.review-q{font-weight:500;font-size:1.02rem;margin-bottom:8px;color:#fff;}
.review-q .rnum{color:var(--ink-soft);font-family:'Fraunces';font-weight:700;font-size:.8rem;margin-right:7px;}
.ans-line{display:flex;gap:9px;align-items:flex-start;font-size:.96rem;padding:3px 0;}
.badge{flex-shrink:0;font-family:'Fraunces';font-weight:700;font-size:.72rem;padding:2px 8px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase;margin-top:3px;}
.badge.correct{background:var(--green-bg);color:var(--green);}
.badge.wrong{background:var(--red-bg);color:var(--red);}
.badge.right-answer{background:rgba(200,146,42,.15);color:var(--gold);}
.your-wrong{color:var(--red);text-decoration:line-through;}
.your-right{color:var(--green);}
.result-actions{text-align:center;margin-top:28px;}
h2.sec{font-family:'Fraunces';font-weight:900;font-size:1.38rem;margin:12px 0 5px;border-top:1px solid var(--line);padding-top:20px;color:#fff;}
footer{text-align:center;margin-top:26px;font-style:italic;color:#444;font-size:.86rem;}
</style>
</head>

function prep(raw){
  const sh=shuffle(raw.o);
  const ci=sh.indexOf(raw.o[raw.r]);
  return{cat:raw.c,text:raw.q,options:sh,correctIndex:ci};
}

function getBest(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return{};}}
function setBest(key,pct){try{const b=getBest();const isNew=b[key]===undefined||pct>b[key];if(isNew){b[key]=pct;localStorage.setItem(STORAGE_KEY,JSON.stringify(b));}return isNew;}catch(e){return false;}}

// ===== START SCREEN =====
function renderStart(){
  const best=getBest();
  const bKey=mode+'_'+testSize;
  const bLine=best[bKey]!==undefined?`Najbolji (${testSize} pit.): <b>${best[bKey]}%</b>`:'';
  const modeDesc=mode==='standard'
    ? 'Rješavaš jednom, na kraju dobiješ rezultat i pregled grešaka.'
    : 'Svako pogrešno pitanje se nasumično ponavlja dok ga ne riješiš točno.';
  const sizes=mode==='standard'?[10,30,50]:[10,20,30];
  const pickerHtml=sizes.map(s=>`
    <button class="pick ${testSize===s?'active':''}" onclick="setSize(${s})">
      <div class="pn">${s}</div><div class="pl">${s<=10?'brzo':s<=20?'kratko':s<=30?'standard':'temeljito'}</div>
    </button>`).join('');
  app.innerHTML=`
    <div class="card start">
      <div class="mode-tabs">
        <button class="mode-tab ${mode==='standard'?'active':''}" onclick="setMode('standard')">Standard</button>
        <button class="mode-tab ${mode==='learning'?'active':''}" onclick="setMode('learning')">Learning</button>
      </div>
      <div class="mode-desc">${modeDesc}</div>
      <div class="picker-label">Koliko pitanja?</div>
      <div class="picker">${pickerHtml}</div>
      <div class="best-line">${bLine}</div>
      <button class="btn-primary" onclick="startQuiz()">Pokreni</button>
    </div>`;
  document.getElementById('foot').textContent=`Baza: ${BANK.length} pitanja iz 14 kolegija.`;
}

function setMode(m){
  mode=m;
  testSize=m==='standard'?30:10;
  renderStart();
}
function setSize(n){testSize=n;renderStart();}

// ===== STANDARD MODE =====
function startQuiz(){
  if(mode==='learning'){startLearning();return;}
  const n=Math.min(testSize,BANK.length);
  quiz=shuffle(BANK).slice(0,n).map(prep);
  answers=new Array(quiz.length).fill(null);
  current=0;answered=false;
  renderQuestion();
}

function scoreSoFar(){return answers.filter((a,i)=>a!==null&&a===quiz[i].correctIndex).length;}

function renderQuestion(){
  const q=quiz[current];
  const sel=answers[current];
  answered=sel!==null;
  const pct=Math.round(current/quiz.length*100);
  const optsHtml=q.options.map((opt,i)=>{
    const letter=String.fromCharCode(65+i);
    let cls='opt',mark=letter;
    if(answered){
      if(i===q.correctIndex){cls+=' correct';mark='✓';}
      else if(i===sel){cls+=' wrong';mark='✕';}
      else cls+=' dim';
    }
    return `<button class="${cls}" ${answered?'disabled':''} onclick="selectOpt(${i})"><span class="marker">${mark}</span><span>${opt}</span></button>`;
  }).join('');
  let fb='';
  if(answered){
    const ok=sel===q.correctIndex;
    fb=ok
      ?`<div class="feedback good"><div class="ftitle">Točno ✓</div></div>`
      :`<div class="feedback bad"><div class="ftitle">Netočno ✕</div><div class="fcorrect">Točno: <b>${q.options[q.correctIndex]}</b></div></div>`;
  }
  const isLast=current===quiz.length-1;
  const nav=!answered
    ?`<span class="waiting">Odaberi odgovor…</span>`
    :(isLast?`<button class="btn-primary" onclick="finish()">Završi →</button>`:`<button class="btn-ghost" onclick="nextQ()">Sljedeće →</button>`);
  app.innerHTML=`
    <div class="card">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text"><span>Pitanje ${current+1} / ${quiz.length}</span><span class="live-score">Točno: <b>${scoreSoFar()}</b></span></div>
      <div class="q-cat">${q.cat}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">${optsHtml}</div>
      ${fb}
      <div class="nav-row">${nav}</div>
    </div>`;
}

function selectOpt(i){if(answered)return;answers[current]=i;renderQuestion();}
function nextQ(){if(current<quiz.length-1){current++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}}

function finish(){
  const correct=scoreSoFar(),total=quiz.length,pct=Math.round(correct/total*100);
  const bKey=mode+'_'+total;
  const isNew=setBest(bKey,pct);
  const best=getBest();
  let verdict,vsub,rc;
  if(pct>=90){verdict="Odlično!";vsub="Gradivo svladano.";rc="var(--green)";}
  else if(pct>=75){verdict="Vrlo dobro";vsub="Solidno znanje.";rc="var(--green)";}
  else if(pct>=60){verdict="Dovoljno";vsub="Ima prostora za napredak.";rc="var(--gold)";}
  else{verdict="Treba još";vsub="Ponovi gradivo i pokušaj opet.";rc="var(--red)";}
  const review=quiz.map((q,i)=>{
    const ok=answers[i]===q.correctIndex;
    const ut=answers[i]===null?"(bez odgovora)":q.options[answers[i]];
    const ct=q.options[q.correctIndex];
    const lines=ok
      ?`<div class="ans-line"><span class="badge correct">Točno</span><span class="your-right">${ut}</span></div>`
      :`<div class="ans-line"><span class="badge wrong">Tvoj</span><span class="your-wrong">${ut}</span></div>
        <div class="ans-line"><span class="badge right-answer">Točno</span><span class="your-right">${ct}</span></div>`;
    return`<div class="review-item"><div class="review-q"><span class="rnum">${i+1}.</span>${q.text}</div>${lines}</div>`;
  }).join('');
  const bb=isNew?`<div class="best-badge">🏆 Novi rekord!</div>`:(best[bKey]!==undefined?`<div class="best-badge">Rekord (${total} pit.): ${best[bKey]}%</div>`:'');
  app.innerHTML=`
    <div class="card">
      <div class="result-head">
        <div class="score-ring" style="background:conic-gradient(${rc} ${pct}%, #222 ${pct}%);">
          <div style="width:110px;height:110px;background:var(--panel);border-radius:50%;display:grid;place-items:center;">
            <span class="score-pct" style="color:${rc}">${pct}%</span>
          </div>
        </div>
        <div class="verdict">${verdict}</div><div class="verdict-sub">${vsub}</div>
        <div class="summary-pills"><div class="pill ok"><div class="n">${correct}</div><div class="l">točno</div></div><div class="pill no"><div class="n">${total-correct}</div><div class="l">netočno</div></div></div>
        ${bb}
      </div>
      <h2 class="sec">Pregled odgovora</h2>${review}
      <div class="result-actions"><button class="btn-primary" onclick="renderStart()">Novi test</button></div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== LEARNING MODE =====
function startLearning(){
  const n=Math.min(testSize,BANK.length);
  pool=shuffle(BANK).slice(0,n).map(prep);
  wrongQueue=[];
  totalAnswered=0;correctCount=0;learnDone=false;
  // queue: go through pool first, then wrong ones randomly
  quiz=[...pool];
  current=0;answered=false;
  renderLearnQ();
}

function renderLearnQ(){
  const remaining=quiz.length-current+wrongQueue.length;
  const q=quiz[current];
  answered=false;

  const optsHtml=q.options.map((opt,i)=>{
    const letter=String.fromCharCode(65+i);
    return`<button class="opt" onclick="selectLearnOpt(${i})"><span class="marker">${letter}</span><span>${opt}</span></button>`;
  }).join('');

  const totalQ=pool.length;
  const pct=Math.round(correctCount/totalQ*100);

  app.innerHTML=`
    <div class="card">
      <div class="mode-badge">Learning mode</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text"><span>Savladano: <b style="font-family:'Fraunces';color:var(--green)">${correctCount} / ${totalQ}</b></span><span class="live-score">Ostalo: <b>${remaining}</b></span></div>
      <div class="q-cat">${q.cat}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">${optsHtml}</div>
      <div id="learn-fb"></div>
      <div class="nav-row" id="learn-nav"><span class="waiting">Odaberi odgovor…</span></div>
    </div>`;
}

function selectLearnOpt(i){
  if(answered)return;
  answered=true;
  const q=quiz[current];
  const ok=i===q.correctIndex;
  totalAnswered++;

  const optsHtml=q.options.map((opt,j)=>{
    const letter=String.fromCharCode(65+j);
    let cls='opt',mark=letter;
    if(j===q.correctIndex){cls+=' correct';mark='✓';}
    else if(j===i&&!ok){cls+=' wrong';mark='✕';}
    else cls+=' dim';
    return`<button class="${cls}" disabled><span class="marker">${mark}</span><span>${opt}</span></button>`;
  }).join('');
  document.querySelector('.options').innerHTML=optsHtml;

  const fb=document.getElementById('learn-fb');
  const nav=document.getElementById('learn-nav');

  if(ok){
    correctCount++;
    fb.innerHTML=`<div class="feedback good"><div class="ftitle">Točno ✓</div></div>`;
    const totalQ=pool.length;
    if(correctCount===totalQ){
      // All done!
      nav.innerHTML=`<button class="btn-primary" onclick="finishLearning()">Završeno! Vidi rezultat →</button>`;
    } else {
      nav.innerHTML=`<button class="btn-ghost" onclick="nextLearnQ()">Sljedeće →</button>`;
    }
  } else {
    fb.innerHTML=`<div class="feedback bad"><div class="ftitle">Netočno ✕</div><div class="fcorrect">Točno: <b>${q.options[q.correctIndex]}</b></div></div>
      <div class="repeat-notice">Ovo pitanje će se <b>ponoviti</b> dok ga ne riješiš točno.</div>`;
    // Add to wrong queue (will be inserted randomly later)
    wrongQueue.push({...q});
    nav.innerHTML=`<button class="btn-ghost" onclick="nextLearnQ()">Sljedeće →</button>`;
  }
}

function nextLearnQ(){
  current++;
  // If we've exhausted current quiz array, inject wrong questions
  if(current>=quiz.length){
    if(wrongQueue.length>0){
      // Shuffle wrong ones and append
      quiz=[...quiz,...shuffle(wrongQueue)];
      wrongQueue=[];
    }
  }
  if(current<quiz.length){
    window.scrollTo({top:0,behavior:'smooth'});
    renderLearnQ();
  } else {
    finishLearning();
  }
}

function finishLearning(){
  const totalQ=pool.length;
  const pct=Math.round(correctCount/totalQ*100);
  const efficiency=Math.round((totalQ/totalAnswered)*100);
  const bKey='learning_'+totalQ;
  const isNew=setBest(bKey,efficiency);
  const best=getBest();
  const bb=isNew?`<div class="best-badge">🏆 Novi rekord efikasnosti!</div>`:(best[bKey]!==undefined?`<div class="best-badge">Rekord efikasnosti (${totalQ} pit.): ${best[bKey]}%</div>`:'');
  app.innerHTML=`
    <div class="card">
      <div class="result-head">
        <div class="score-ring" style="background:conic-gradient(var(--green) 100%, #222 100%);">
          <div style="width:110px;height:110px;background:var(--panel);border-radius:50%;display:grid;place-items:center;">
            <span class="score-pct" style="color:var(--green)">✓</span>
          </div>
        </div>
        <div class="verdict">Sve savladano!</div>
        <div class="verdict-sub">Svako pitanje riješeno točno barem jednom.</div>
        <div class="summary-pills">
          <div class="pill ok"><div class="n">${totalQ}</div><div class="l">pitanja</div></div>
          <div class="pill" style="text-align:center"><div class="n" style="font-family:'Fraunces';font-weight:900;font-size:2rem;color:var(--gold)">${totalAnswered}</div><div class="l" style="font-style:italic;color:var(--ink-soft)">pokušaja</div></div>
          <div class="pill" style="text-align:center"><div class="n" style="font-family:'Fraunces';font-weight:900;font-size:2rem;color:var(--acc2)">${efficiency}%</div><div class="l" style="font-style:italic;color:var(--ink-soft)">efikasnost</div></div>
        </div>
        ${bb}
      </div>
      <div class="result-actions"><button class="btn-primary" onclick="renderStart()">Novi test</button></div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function init(){try{renderStart();}catch(e){app.innerHTML='<div class="card start"><p>Greška: '+e.message+'</p></div>';}}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
</script>
</body>
</html>
